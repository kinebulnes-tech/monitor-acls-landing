name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
  schedule:
    # Every Monday at 09:00 Santiago time (UTC-3 / UTC-4 DST → 12:00 UTC is safe)
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit for high and critical vulnerabilities
        # --audit-level=high fails the job only on high/critical
        # moderate dev-only vulnerabilities (e.g. esbuild) do not block CI
        run: npm audit --audit-level=high --omit=dev

      - name: Full audit report (informational)
        # Always runs so the full picture is visible in the logs
        run: npm audit --omit=dev || true
